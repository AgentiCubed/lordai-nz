  <style>

    .lost__code{font-family:var(--font-display);font-size:clamp(5rem,22vw,12rem);line-height:.9;letter-spacing:.04em}
    .lost__sigil{font-size:clamp(40px,9vw,72px);line-height:1;filter:drop-shadow(var(--glow-gold));margin-bottom:var(--space-4)}

<body>
  <a class="skip-link" href="#lost">Skip to content</a>
  <main class="wrap lost" id="lost">
    <div class="lost__sigil" aria-hidden="true">🤘</div>
    <p class="eyebrow">Nazarick · uncharted corridor</p>
    <p class="lost__code gold-text">404</p>
    <div class="rule"></div>
    <h1 class="lost__title">This passage does not exist.</h1>
    <p class="lost__body">You have wandered into a corridor the tomb never built.

    </div>
  </main>
